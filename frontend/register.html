<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Student Wellness Hub</title>
  <link rel="stylesheet" href="style.css"> <!-- uses same CSS as login.html -->
  <style>
    /* small overrides so register matches login look */
    .register-section { padding: 3rem 0; display:flex; justify-content:center; align-items:center; min-height:60vh; }
    .register-card { max-width:420px; width:100%; padding:2rem; border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,0.08); background:#fff; }
    .register-card h3 { margin-bottom:1rem; color:#0077b6; }
    .form-row { margin-bottom:12px; text-align:left; }
    .form-row label { display:block; font-weight:600; margin-bottom:6px; }
    .form-row input { width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; }
    .register-button { background:#00b4d8; color:#fff; padding:12px; border-radius:8px; border:none; cursor:pointer; width:100%; font-weight:600; }
    .register-button:hover { background:#0077b6; }
    .small-link { text-align:center; margin-top:12px; }
    #msg { margin-top:12px; text-align:center; color:#023e8a; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>Student Wellness Hub</h1>
    </div>
  </header>

  <main>
    <section class="register-section">
      <div class="register-card">
        <h3>Create account</h3>

        <form id="regForm">
          <div class="form-row">
            <label for="username">Username</label>
            <input id="username" name="username" required />
          </div>

          <div class="form-row">
            <label for="email">Email (optional)</label>
            <input id="email" name="email" type="email" />
          </div>

          <div class="form-row">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required />
          </div>

          <button type="submit" class="register-button">Register</button>
        </form>

        <p id="msg"></p>
        <p class="small-link">Already have an account? <a href="login.html">Login here</a></p>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2025 Student Wellness Hub</p>
    </div>
  </footer>

  <script>
    const regForm = document.getElementById('regForm');
    const msg = document.getElementById('msg');

    regForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = 'Registering...';
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('https://student-wellness-hub.onrender.com/register', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          credentials: 'include', // include cookies
          body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();

        if (res.ok) {
          msg.style.color = '#117a65';
          msg.textContent = data.message || 'Registration successful — redirecting to login...';
          setTimeout(() => window.location.href = 'login.html', 900);
        } else {
          msg.style.color = '#b00020';
          msg.textContent = data.message || 'Registration failed';
        }
      } catch (err) {
        msg.style.color = '#b00020';
        msg.textContent = 'Server error — please check server console or CORS settings.';
        console.error('Register error:', err);
      }
    });
  </script>
</body>
</html>
