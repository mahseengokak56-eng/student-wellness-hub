<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Student Wellness Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
        <div class="container">
            <h1>Student Wellness Hub</h1>
        </div>
  </header>

  <main>
       <section class="login-section">
           <div class="container">
               <div class="card login-card">
                   <h3>Login</h3>
                   <form id="login-form" action="javascript:void(0);" method="post" autocomplete="on">
                     <label for="username">Username</label>
                     <input
                      type="text"
                      id="username"
                      name="username"
                      required
                      autocomplete="username"
                      placeholder="Your username">

                     <label for="password">Password</label>
                     <input
                     type="password"
                     id="password"
                     name="password"
                     required
                     autocomplete="current-password"
                     placeholder="Your password">
                     <button type="submit" class="login-button">Login</button>
                    </form>
                    <p>Don't have an account? <a href="index.html">Register here</a></p>

              </div>
           </div>
       </section>
  </main>

  <footer>
       <div class="container">
           <p>&copy; 2025 Student Wellness Hub. All Rights Reserved.</p>
       </div>
  </footer>
  <script src="script.js"></script>

</body>
</html>
